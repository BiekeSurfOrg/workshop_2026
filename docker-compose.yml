services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.4.14 # Pinned frozen version
    container_name: openclaw-agent
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # Mounts your pre-configured data and workspace
      - ./data:/home/node/.openclaw
      - ./data/workspace:/home/node/openclaw/workspace
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN} # Pre-set token for easy login
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} # Loaded from a local.env file
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
