version: '3.8'
services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:v2026.3.10 # Pinned frozen version
    container_name: openclaw-agent
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # Mounts your pre-configured data and workspace
      -./data:/home/node/.openclaw -./data/workspace:/home/node/openclaw/workspace
    environment:
      - OPENCLAW_GATEWAY_TOKEN=workshop2026 # Pre-set token for easy login
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} # Loaded from a local.env file
